<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chip Search</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @media (max-width: 640px) {
            .card-view { display: block; }
            .table-view { display: none; }
        }
        @media (min-width: 641px) {
            .card-view { display: none; }
            .table-view { display: block; }
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen">
    <div class="container mx-auto px-2 sm:px-4 py-4 sm:py-8">
        <h1 class="text-2xl sm:text-3xl font-bold text-center text-gray-800 mb-4 sm:mb-8">Chip Database</h1>
        
        <!-- Search Box -->
        <div class="max-w-xl mx-auto mb-4 sm:mb-8">
            <div class="relative">
                <input 
                    type="text" 
                    id="searchInput" 
                    placeholder="Search chips..." 
                    class="w-full px-4 py-3 pl-12 text-gray-700 bg-white border border-gray-300 rounded-lg shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent text-base"
                >
                <svg class="absolute left-4 top-3.5 h-5 w-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
                </svg>
            </div>
            <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between mt-2 gap-2">
                <p id="resultCount" class="text-sm text-gray-500"></p>
                <div class="flex items-center gap-2">
                    <label for="pageSize" class="text-sm text-gray-500">Per page:</label>
                    <select id="pageSize" class="text-sm border border-gray-300 rounded px-2 py-1 bg-white">
                        <option value="10" selected>10</option>
                        <option value="25">25</option>
                        <option value="50">50</option>
                        <option value="100">100</option>
                    </select>
                </div>
            </div>
        </div>

        <!-- Mobile Card View -->
        <div class="card-view space-y-3" id="cardContainer"></div>

        <!-- Desktop Table View -->
        <div class="table-view overflow-x-auto bg-white rounded-lg shadow">
            <table class="min-w-full divide-y divide-gray-200">
                <thead class="bg-gray-50">
                    <tr>
                        <th class="px-4 lg:px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Name</th>
                        <th class="px-4 lg:px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Manufacturer</th>
                        <th class="px-4 lg:px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">RAM</th>
                        <th class="px-4 lg:px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">ROM</th>
                        <th class="px-4 lg:px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Type</th>
                    </tr>
                </thead>
                <tbody id="tableBody" class="bg-white divide-y divide-gray-200">
                </tbody>
            </table>
        </div>

        <!-- Pagination -->
        <div class="flex flex-col sm:flex-row items-center justify-between mt-4 gap-3">
            <div class="text-sm text-gray-500" id="pageInfo"></div>
            <div class="flex items-center gap-1 sm:gap-2" id="paginationControls"></div>
        </div>
    </div>

    <script>
        let chipsData = [];
        let filteredData = [];
        let currentPage = 1;
        let pageSize = 10;

        // Fetch data from chips.json
        async function loadData() {
            try {
                const response = await fetch('chips.json');
                chipsData = await response.json();
                filteredData = chipsData;
                renderPage();
            } catch (error) {
                console.error('Error loading data:', error);
                document.getElementById('tableBody').innerHTML = 
                    '<tr><td colspan="5" class="px-6 py-4 text-center text-red-500">Error loading data</td></tr>';
                document.getElementById('cardContainer').innerHTML = 
                    '<div class="bg-white p-4 rounded-lg shadow text-center text-red-500">Error loading data</div>';
            }
        }

        // Calculate total pages
        function getTotalPages() {
            return Math.ceil(filteredData.length / pageSize);
        }

        // Get current page data
        function getCurrentPageData() {
            const start = (currentPage - 1) * pageSize;
            const end = start + pageSize;
            return filteredData.slice(start, end);
        }

        // Render table with data
        function renderTable(data) {
            const tbody = document.getElementById('tableBody');
            
            if (data.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" class="px-6 py-4 text-center text-gray-500">No results found</td></tr>';
                return;
            }

            tbody.innerHTML = data.map(chip => `
                <tr class="hover:bg-gray-50">
                    <td class="px-4 lg:px-6 py-4 whitespace-nowrap text-sm font-medium text-gray-900">${chip.name}</td>
                    <td class="px-4 lg:px-6 py-4 whitespace-nowrap text-sm text-gray-500">${chip.manufacturer}</td>
                    <td class="px-4 lg:px-6 py-4 whitespace-nowrap text-sm text-gray-500">${chip.ram}</td>
                    <td class="px-4 lg:px-6 py-4 whitespace-nowrap text-sm text-gray-500">${chip.rom}</td>
                    <td class="px-4 lg:px-6 py-4 whitespace-nowrap text-sm text-gray-500">${chip.type}</td>
                </tr>
            `).join('');
        }

        // Render mobile cards
        function renderCards(data) {
            const container = document.getElementById('cardContainer');
            
            if (data.length === 0) {
                container.innerHTML = '<div class="bg-white p-4 rounded-lg shadow text-center text-gray-500">No results found</div>';
                return;
            }

            container.innerHTML = data.map(chip => `
                <div class="bg-white rounded-lg shadow p-4">
                    <h3 class="font-semibold text-gray-900 text-base mb-2 break-all">${chip.name}</h3>
                    <div class="grid grid-cols-2 gap-2 text-sm">
                        <div>
                            <span class="text-gray-500">Manufacturer:</span>
                            <span class="text-gray-700 ml-1">${chip.manufacturer}</span>
                        </div>
                        <div>
                            <span class="text-gray-500">Type:</span>
                            <span class="text-gray-700 ml-1">${chip.type}</span>
                        </div>
                        <div>
                            <span class="text-gray-500">RAM:</span>
                            <span class="text-gray-700 ml-1">${chip.ram}</span>
                        </div>
                        <div>
                            <span class="text-gray-500">ROM:</span>
                            <span class="text-gray-700 ml-1">${chip.rom}</span>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // Render pagination controls
        function renderPagination() {
            const totalPages = getTotalPages();
            const container = document.getElementById('paginationControls');
            const pageInfo = document.getElementById('pageInfo');
            
            const start = (currentPage - 1) * pageSize + 1;
            const end = Math.min(currentPage * pageSize, filteredData.length);
            pageInfo.textContent = filteredData.length > 0 
                ? `${start}-${end} of ${filteredData.length}` 
                : '0 results';

            if (totalPages <= 1) {
                container.innerHTML = '';
                return;
            }

            let buttons = [];
            
            // Previous button
            buttons.push(`
                <button onclick="goToPage(${currentPage - 1})" 
                    class="px-2 sm:px-3 py-1.5 text-sm rounded border ${currentPage === 1 
                        ? 'bg-gray-100 text-gray-400 cursor-not-allowed' 
                        : 'bg-white text-gray-700 hover:bg-gray-50'}"
                    ${currentPage === 1 ? 'disabled' : ''}>
                    <span class="hidden sm:inline">Prev</span>
                    <span class="sm:hidden">‹</span>
                </button>
            `);

            // Page numbers
            const maxButtons = window.innerWidth < 640 ? 3 : 5;
            let startPage = Math.max(1, currentPage - Math.floor(maxButtons / 2));
            let endPage = Math.min(totalPages, startPage + maxButtons - 1);
            
            if (endPage - startPage < maxButtons - 1) {
                startPage = Math.max(1, endPage - maxButtons + 1);
            }

            if (startPage > 1) {
                buttons.push(`
                    <button onclick="goToPage(1)" 
                        class="px-2 sm:px-3 py-1.5 text-sm rounded border bg-white text-gray-700 hover:bg-gray-50">1</button>
                `);
                if (startPage > 2) {
                    buttons.push('<span class="px-1 text-gray-400">...</span>');
                }
            }

            for (let i = startPage; i <= endPage; i++) {
                buttons.push(`
                    <button onclick="goToPage(${i})" 
                        class="px-2 sm:px-3 py-1.5 text-sm rounded border ${i === currentPage 
                            ? 'bg-blue-500 text-white' 
                            : 'bg-white text-gray-700 hover:bg-gray-50'}">${i}</button>
                `);
            }

            if (endPage < totalPages) {
                if (endPage < totalPages - 1) {
                    buttons.push('<span class="px-1 text-gray-400">...</span>');
                }
                buttons.push(`
                    <button onclick="goToPage(${totalPages})" 
                        class="px-2 sm:px-3 py-1.5 text-sm rounded border bg-white text-gray-700 hover:bg-gray-50">${totalPages}</button>
                `);
            }

            // Next button
            buttons.push(`
                <button onclick="goToPage(${currentPage + 1})" 
                    class="px-2 sm:px-3 py-1.5 text-sm rounded border ${currentPage === totalPages 
                        ? 'bg-gray-100 text-gray-400 cursor-not-allowed' 
                        : 'bg-white text-gray-700 hover:bg-gray-50'}"
                    ${currentPage === totalPages ? 'disabled' : ''}>
                    <span class="hidden sm:inline">Next</span>
                    <span class="sm:hidden">›</span>
                </button>
            `);

            container.innerHTML = buttons.join('');
        }

        // Go to specific page
        function goToPage(page) {
            const totalPages = getTotalPages();
            if (page < 1 || page > totalPages) return;
            currentPage = page;
            renderPage();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // Render full page
        function renderPage() {
            const data = getCurrentPageData();
            renderTable(data);
            renderCards(data);
            renderPagination();
            updateResultCount();
        }

        // Update result count
        function updateResultCount() {
            document.getElementById('resultCount').textContent = `${filteredData.length} chip(s) found`;
        }

        // Search/filter function
        function filterData(searchTerm) {
            const term = searchTerm.toLowerCase().trim();
            
            if (!term) {
                filteredData = chipsData;
            } else {
                filteredData = chipsData.filter(chip => 
                    chip.name.toLowerCase().includes(term) ||
                    chip.manufacturer.toLowerCase().includes(term) ||
                    chip.ram.toLowerCase().includes(term) ||
                    chip.rom.toLowerCase().includes(term) ||
                    chip.type.toLowerCase().includes(term)
                );
            }

            currentPage = 1;
            renderPage();
        }

        // Event listeners
        document.getElementById('searchInput').addEventListener('input', (e) => {
            filterData(e.target.value);
        });

        document.getElementById('pageSize').addEventListener('change', (e) => {
            pageSize = parseInt(e.target.value);
            currentPage = 1;
            renderPage();
        });

        // Handle window resize for pagination
        window.addEventListener('resize', renderPagination);

        // Load data on page load
        loadData();
    </script>
</body>
</html>
